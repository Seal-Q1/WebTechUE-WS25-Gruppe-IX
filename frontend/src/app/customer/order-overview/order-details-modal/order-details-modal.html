<div class="order-details-modal">
  <h2>Order Details</h2>
    @for(item of orderItems(); track item.id) {
      <div class="order-item">
        <div class="order-info">{{item.itemData.name}} (x{{item.quantity}}) - {{item.unitPrice.toFixed(2)}} €</div>
        <div class="order-price-sum">Total: {{(item.unitPrice * item.quantity).toFixed(2)}} €</div>
      </div>
    }
  <div class="order-discount">Discount: {{order.couponId !== undefined}}</div>
  <div class="order-total">Total: {{order.paidAmount.toFixed(2)}} €</div>
</div>
